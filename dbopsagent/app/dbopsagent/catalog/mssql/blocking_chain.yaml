name: blocking_chain
description: Walks the full blocking chain using a recursive CTE (up to 10 levels deep). Returns each blocked session with its blocker, wait type, wait time, wait resource, and current query text.
db_type: mssql
default_database: master
---
WITH BlockingChain AS (
    SELECT
        r.session_id,
        r.blocking_session_id,
        r.wait_type,
        r.wait_time,
        r.wait_resource,
        t.text AS query_text,
        0 AS level
    FROM sys.dm_exec_requests r
    CROSS APPLY sys.dm_exec_sql_text(r.sql_handle) t
    WHERE r.blocking_session_id != 0

    UNION ALL

    SELECT
        r.session_id,
        r.blocking_session_id,
        r.wait_type,
        r.wait_time,
        r.wait_resource,
        t.text,
        bc.level + 1
    FROM sys.dm_exec_requests r
    CROSS APPLY sys.dm_exec_sql_text(r.sql_handle) t
    JOIN BlockingChain bc ON r.session_id = bc.blocking_session_id
    WHERE bc.level < 10
)
SELECT * FROM BlockingChain ORDER BY level, session_id;
