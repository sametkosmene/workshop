name: server_cpu_utilization
description: Reads the SQL Server ring buffer to show a historical breakdown of SQL Server CPU%, idle CPU%, and other process CPU% over time. Useful for spotting CPU pressure trends.
db_type: mssql
default_database: master
---
SELECT
    record_id,
    EventTime,
    SQLProcessUtilization AS sql_cpu_pct,
    SystemIdle AS idle_cpu_pct,
    100 - SystemIdle - SQLProcessUtilization AS other_cpu_pct
FROM (
    SELECT
        record.value('(./Record/@id)[1]', 'int') AS record_id,
        record.value('(./Record/SchedulerMonitorEvent/SystemHealth/ProcessUtilization)[1]', 'int') AS SQLProcessUtilization,
        record.value('(./Record/SchedulerMonitorEvent/SystemHealth/SystemIdle)[1]', 'int') AS SystemIdle,
        DATEADD(ms, -1 * (ts_now - timestamp), GETDATE()) AS EventTime
    FROM (
        SELECT timestamp, CONVERT(xml, record) AS record, cpu_ticks / (cpu_ticks/ms_ticks) AS ts_now
        FROM sys.dm_os_ring_buffers
        CROSS JOIN sys.dm_os_sys_info
        WHERE ring_buffer_type = N'RING_BUFFER_SCHEDULER_MONITOR'
    ) AS t
) AS cpu_usage
ORDER BY record_id DESC;
